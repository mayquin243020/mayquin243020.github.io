<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>
</head>
<style>
    .request {
        margin: 10px;
        padding: 8px 10px;
        background: #1b100a;
        color: white;
        border: 0px;
    }

    .signup {
        margin: 10px;
        padding: 8px 20px;
        background-color: #52A357;
        color: white;
        border-radius: 5px;
        border: 0px;
    }

    .card {
        margin: 10px;
        padding: 8px 60px;
        border-radius: 20px;
        border: 0px;
        background-color: #f9da4e;
        border: 0px;
    }

    .start {
        margin: 10px;
        padding: 8px 10px;
        background-color: purple;
        border-radius: 5px;
        border: 0px;
        color: white;
    }

    .down {
        margin: 10px;
        padding: 8px 10px;
        background-color: #FFFFFF;
        color: grey;
        border: 1px solid grey;
        border-radius: 2px
    }

    .web {
        margin: 10px;
        padding: 8px 10px;
        padding: 8px 20px;
        background-color: #2c62b6;
        color: #FFFFFF;
        border: 0px;
        border-radius: 20px;
    }

    .save {
        margin: 10px;
        padding: 8px 15px;
        background-color: #FFFFFF;
        color: blue;
        border: 1px solid blue;
        border-radius: 30px
    }
</style>

<body>
    <button class="request">Request Now </button>
    <button class="signup">Sign Up</button>
    <button class="card">Add to Cart</button>
    <br>
    <button class="start">Get Started</button>
    <button class="down">Download</button>
    <button class="web">Apply on companywebsite</button>
    <button class="save">Save</button>

</body>

</html>
