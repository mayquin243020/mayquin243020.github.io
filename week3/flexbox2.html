<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox2</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&family=Space+Grotesk:wght@300..700&display=swap');

    body {
        background-color: white;
        color: black;
    }

    .container {
        max-width: 1280px;
        margin: auto;
    }

    .top {
        display: flex;
        justify-content: space-between;
        align-items: center;


    }

    .navbar {
        display: flex;
        gap: 40px;

    }

    .text {
        font-family: "Oxygen", sans-serif;
        font-size: 20px;
        font-weight: 400;
        display: flex;

    }

    .request {
        border: 1px black solid;
        border-radius: 8px;
        padding: 20px 30px;
    }

    h2,
    p {
        margin-left: 20px;
        font-family: "Oxygen", sans-serif;
        ;
    }
</style>

<body>
    <div class="container">
        <div class="top">
            <div>
                <img src="image/logo.png" alt="Positivus Logo" width="200px">
            </div>
            <div class="navbar">
                <div class="text">
                    <div>About US </div>
                    <div>Services </div>
                    <div>Use Cases </div>
                    <div>Pricing </div>
                    <div>Blog</div>
                    <div class="request">
                        <div>Request a quote </div>
                    </div>
                </div>
            </div>
        </div>
        <p>Our digital marketing agency helps businesses grow and succeed online throuhgh a range of service
            including SEO,PPC social media marketing , and content creation.</p>
    </div>
</body>

</html>
